server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Default nginx limit is 1 MB, which rejects topology cache uploads
    # (can run 5-15+ MB once device detail and future config tables are
    # bundled). 50 MB gives plenty of headroom; nginx streams the body
    # so this is a ceiling, not an allocation.
    client_max_body_size 50M;

    # Serve static files; fall back to index.html for SPA routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy REST API requests to the server container
    location /api/ {
        proxy_pass http://server:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy WebSocket connections to the server container
    location /ws/ {
        proxy_pass http://server:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
