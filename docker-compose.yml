services:
  simulator:
    build:
      context: .
      dockerfile: simulator/Dockerfile
    ports:
      - "10161-10167:10161-10167/udp"
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - topology-net

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      simulator:
        condition: service_healthy
    environment:
      - SIMULATOR_HOST=simulator
      - SIMULATOR_REST_PORT=8001
      - MERAKI_API_KEY=${MERAKI_API_KEY:-}
    volumes:
      # Persist the SQLite topology/config cache across container
      # restarts and redeploys.  Matches the DB_PATH in server/db.py.
      - topology-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/status')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - topology-net

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - "${UI_PORT:-80}:80"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - topology-net

  nr_ingest:
    build:
      context: .
      dockerfile: nr_ingest/Dockerfile
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    environment:
      - NR_LICENSE_KEY=${NR_LICENSE_KEY}
      - NR_ACCOUNT_ID=${NR_ACCOUNT_ID}
    volumes:
      - topology-data:/app/data
    networks:
      - topology-net

networks:
  topology-net:
    driver: bridge

volumes:
  topology-data:
